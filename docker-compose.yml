version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: flim
    volumes:
      - mongodb_data:/data/db

  flim:
    build: .
    ports:
      - "50051:50051"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/flim
      JWT_SECRET: your-secret-key-change-this
    depends_on:
      - mongodb

volumes:
  mongodb_data:
